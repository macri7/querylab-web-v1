<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirigiendo...</title>
    <script>
        (function() {
            const path = window.location.pathname;
            const baseUrl = '/querylab-web-v1';
            
            // Si la ruta no comienza con /querylab-web-v1/, redirigir
            if (!path.startsWith(baseUrl)) {
                // Construir la nueva URL
                let redirectPath = path;
                if (redirectPath === '/' || redirectPath === '') {
                    redirectPath = baseUrl + '/';
                } else {
                    redirectPath = baseUrl + path;
                }
                
                // Mantener query params si existen
                if (window.location.search) {
                    redirectPath += window.location.search;
                }
                
                // Redirigir
                window.location.replace(redirectPath);
            } else {
                // Si ya está en el path correcto, redirigir a inicio
                window.location.replace(baseUrl + '/');
            }
        })();
    </script>
</head>
<body>
    <p>Redirigiendo...</p>
</body>
</html>
